<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelWar</title>
    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
        }
        .canvas {
            display: grid;
            grid-template-columns: repeat(100, 5px);
            width: 500px;
            margin: 20px auto;
        }
        .pixel {
            width: 5px;
            height: 5px;
            border: 1px solid #ddd;
            cursor: pointer;
        }
        button, input {
            margin: 10px;
            padding: 5px 10px;
        }
    </style>
</head>
<body>
    <h1>PixelWar</h1>
    <button id="connectWallet">Connect Wallet</button>
    <div id="placeholder">
        <p>You will connect to MetaMask and confirm the transaction. It’s free!</p>
    </div>
    <div id="controls" style="display: none;">
        <input type="color" id="colorPicker" value="#000000">
        <p id="timer">Time left: 24h 0m 0s</p>
        <div id="canvas" class="canvas"></div>
    </div>

    <script>
        const CANVAS_SIZE = 100;
        const canvas = document.getElementById('canvas');
        const colorPicker = document.getElementById('colorPicker');
        const connectWalletBtn = document.getElementById('connectWallet');
        const placeholder = document.getElementById('placeholder');
        const controls = document.getElementById('controls');
        const timerDisplay = document.getElementById('timer');

        // Initialisiere das Canvas mit weißen Pixeln
        for (let i = 0; i < CANVAS_SIZE * CANVAS_SIZE; i++) {
            const pixel = document.createElement('div');
            pixel.className = 'pixel';
            pixel.style.backgroundColor = '#FFFFFF';
            pixel.addEventListener('click', () => {
                if (controls.style.display === 'block') {
                    pixel.style.backgroundColor = colorPicker.value;
                    // Hier könnte MetaMask-Transaktion simuliert werden
                    alert('Pixel placed! (MetaMask confirmation simulated)');
                }
            });
            canvas.appendChild(pixel);
        }

        // MetaMask-Verbindung simulieren
        connectWalletBtn.addEventListener('click', () => {
            if (typeof window.ethereum !== 'undefined') {
                window.ethereum.request({ method: 'eth_requestAccounts' })
                    .then(accounts => {
                        connectWalletBtn.textContent = `Connected: ${accounts[0].slice(0, 6)}...`;
                        placeholder.style.display = 'none';
                        controls.style.display = 'block';
                    })
                    .catch(err => alert('Error connecting to MetaMask: ' + err.message));
            } else {
                alert('Please install MetaMask!');
            }
        });

        // Einfacher 24-Stunden-Timer
        let timeLeft = 24 * 60 * 60; // 24 Stunden in Sekunden
        setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                const hours = Math.floor(timeLeft / 3600);
                const minutes = Math.floor((timeLeft % 3600) / 60);
                const seconds = timeLeft % 60;
                timerDisplay.textContent = `Time left: ${hours}h ${minutes}m ${seconds}s`;
            } else {
                timerDisplay.textContent = 'Round ended!';
            }
        }, 1000);
    </script>
</body>
</html>
