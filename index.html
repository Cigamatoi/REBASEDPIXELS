<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REBASED PIXELS</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0f0f1a;
      color: #e0e0e0;
      font-family: 'Orbitron', sans-serif;
      overflow-x: hidden;
      position: relative;
    }

    header {
      text-align: center;
      padding: 2rem;
      font-size: 3rem;
      color: #00ffcc;
      text-shadow: 0 0 20px #00ffcc;
    }

    .main-card {
      margin: 2rem auto;
      padding: 2rem;
      background: rgba(20, 20, 40, 0.9);
      border-radius: 20px;
      width: 90%;
      max-width: 1000px;
      border: 2px solid #00ffcc;
      box-shadow: 0 0 25px rgba(0, 255, 204, 0.3);
      text-align: center;
    }

    .wallet-card {
      background: rgba(10, 10, 25, 0.9);
      border-radius: 15px;
      padding: 1.5rem;
      margin: 1rem 0;
      box-shadow: 0 0 15px rgba(0, 255, 204, 0.1);
    }

    .wallet-card button {
      background: linear-gradient(90deg, #00ffcc, #00bbaa);
      border: none;
      padding: 0.75rem 1.5rem;
      margin: 0.5rem;
      border-radius: 10px;
      color: #000;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 0 12px #00ffcc;
      transition: transform 0.2s, box-shadow 0.3s;
    }

    .wallet-card button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #00ffcc;
    }

    .color-picker {
      margin: 1rem 0;
      display: none; /* Hidden until wallet is connected */
    }

    .color-option {
      width: 30px;
      height: 30px;
      display: inline-block;
      margin: 0 5px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid #ffffff00;
      transition: border 0.2s;
    }

    .color-option.selected {
      border: 2px solid #00ffcc;
    }

    .canvas-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 2rem;
    }

    #pixelCanvas {
      border: 2px solid #00ffcc;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
      background-color: #0f0f1a;
    }

    .background-splashes {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: -1;
    }

    .splash {
      position: absolute;
      width: 150px;
      height: 150px;
      background: radial-gradient(circle, #00ffcc55, transparent 70%);
      border-radius: 50%;
      filter: blur(40px);
      animation: move 20s infinite linear;
    }

    @keyframes move {
      0% { transform: translateY(0) translateX(0); }
      100% { transform: translateY(50vh) translateX(100vw); }
    }

    footer {
      margin-top: 3rem;
      text-align: center;
      font-size: 0.9rem;
      color: #555;
    }
  </style>
</head>
<body>
  <header>
    REBASED PIXELS
  </header>

  <div class="main-card">
    <div class="wallet-card">
      <div>Wallet: <span id="walletAddress">Not Connected</span></div>
      <div>Balance: <span id="walletBalance">0</span></div>
      <button onclick="connectWallet()">Connect Wallet</button>
      <div class="color-picker" id="colorPicker">
        <div class="color-option" style="background-color: #ff0000" onclick="selectColor('#ff0000')"></div>
        <div class="color-option" style="background-color: #00ff00" onclick="selectColor('#00ff00')"></div>
        <div class="color-option" style="background-color: #0000ff" onclick="selectColor('#0000ff')"></div>
        <div class="color-option" style="background-color: #ffff00" onclick="selectColor('#ffff00')"></div>
        <div class="color-option" style="background-color: #ff00ff" onclick="selectColor('#ff00ff')"></div>
        <div class="color-option" style="background-color: #00ffff" onclick="selectColor('#00ffff')"></div>
      </div>
    </div>

    <div class="canvas-wrapper">
      <canvas id="pixelCanvas" width="800" height="800"></canvas>
    </div>
  </div>

  <footer>
    Powered by IOTA Rebased Testnet | Epoch Ends in: <span id="epochTimer">23:59:59</span>
  </footer>

  <div class="background-splashes">
    <div class="splash" style="top:10%; left:5%; animation-delay: 0s;"></div>
    <div class="splash" style="top:30%; left:60%; animation-delay: 5s;"></div>
    <div class="splash" style="top:50%; left:30%; animation-delay: 10s;"></div>
    <div class="splash" style="top:70%; left:80%; animation-delay: 15s;"></div>
  </div>

  <script>
    let isWalletConnected = false;
    let selectedColor = '#ff0000'; // Default color
    const pixelSize = 20;

    function connectWallet() {
      // Simulate wallet connection
      document.getElementById('walletAddress').textContent = '0x1234...5678';
      document.getElementById('walletBalance').textContent = '100';
      isWalletConnected = true;
      document.getElementById('colorPicker').style.display = 'block';
      alert('Wallet connected successfully!');
    }

    function selectColor(color) {
      if (!isWalletConnected) {
        alert('Please connect your wallet first!');
        return;
      }
      selectedColor = color;
      document.querySelectorAll('.color-option').forEach(option => {
        option.classList.remove('selected');
        if (option.style.backgroundColor === color) {
          option.classList.add('selected');
        }
      });
    }

    const canvas = document.getElementById('pixelCanvas');
    const ctx = canvas.getContext('2d');

    // Initialize grid
    function drawGrid() {
      ctx.fillStyle = '#111';
      for (let x = 0; x < 800; x += pixelSize) {
        for (let y = 0; y < 800; y += pixelSize) {
          ctx.fillRect(x, y, pixelSize - 2, pixelSize - 2);
        }
      }
    }

    // Handle pixel painting
    canvas.addEventListener('click', (e) => {
      if (!isWalletConnected) {
        alert('Please connect your wallet first!');
        return;
      }
      
      const rect = canvas.getBoundingClientRect();
      const x = Math.floor((e.clientX - rect.left) / pixelSize) * pixelSize;
      const y = Math.floor((e.clientY - rect.top) / pixelSize) * pixelSize;
      
      ctx.fillStyle = selectedColor;
      ctx.fillRect(x, y, pixelSize - 2, pixelSize - 2);
    });

    // Initial draw
    drawGrid();
  </script>
</body>
</html>
