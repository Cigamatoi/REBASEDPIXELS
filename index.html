<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REBASED PIXELS</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Roboto+Mono&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at top left, #0f0f1a 0%, #000000 100%);
      background-image: url('https://www.transparenttextures.com/patterns/black-felt.png');
      color: #e0e0e0;
      font-family: 'Roboto Mono', monospace;
      overflow-x: hidden;
    }

    header {
      text-align: center;
      padding: 2rem;
      font-family: 'Orbitron', sans-serif;
      font-size: 3rem;
      color: #00ffcc;
      text-shadow: 0 0 20px #00ffcc, 0 0 40px #00ffcc;
      animation: flicker 2s infinite;
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }

    .main-card {
      margin: 2rem auto;
      padding: 2rem;
      background: rgba(20, 20, 40, 0.9);
      border-radius: 20px;
      width: 90%;
      max-width: 900px;
      border: 2px solid #00ffcc;
      box-shadow: 0 0 25px rgba(0, 255, 204, 0.3), inset 0 0 15px rgba(0, 255, 204, 0.2);
    }

    .wallet-card, .section {
      background: rgba(10, 10, 25, 0.8);
      border: none;
      border-radius: 15px;
      padding: 1.5rem;
      margin: 1rem 0;
      text-align: center;
      box-shadow: 0 0 15px rgba(0, 255, 204, 0.1);
    }

    .wallet-card button, .game-btn {
      background: linear-gradient(90deg, #00ffcc, #00bbaa);
      border: none;
      padding: 0.75rem 1.5rem;
      margin-top: 1rem;
      border-radius: 10px;
      color: #000;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 0 12px #00ffcc;
      transition: transform 0.2s, box-shadow 0.3s;
    }

    .wallet-card button:hover, .game-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #00ffcc;
    }

    .canvas-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 2rem;
    }

    #pixelCanvas {
      border: 2px solid #00ffcc;
      border-radius: 12px;
      box-shadow: 0 0 30px rgba(0, 255, 204, 0.3);
      background-color: #0f0f1a;
    }

    footer {
      margin-top: 3rem;
      text-align: center;
      font-size: 0.9rem;
      color: #555;
    }
  </style>
</head>
<body>
  <header>
    REBASED PIXELS
  </header>

  <div class="main-card">
    <div class="wallet-card">
      <div>Wallet: <span id="walletAddress">Not Connected</span></div>
      <div>Balance: <span id="walletBalance">0</span></div>
      <button onclick="connectWallet()">Connect Wallet</button>
    </div>

    <div class="section">
      <h2>Select Game Mode</h2>
      <button class="game-btn">Quiz</button>
      <button class="game-btn">Whack-a-Mole</button>
      <button class="game-btn">Snake</button>
      <button class="game-btn">Flappy Frog</button>
      <button class="game-btn">Leaderboard</button>
    </div>

    <div class="canvas-wrapper">
      <canvas id="pixelCanvas" width="400" height="400"></canvas>
    </div>
  </div>

  <footer>
    Powered by IOTA Rebased Testnet | Epoch Ends in: <span id="epochTimer">23:59:59</span>
  </footer>

  <script>
    function connectWallet() {
      alert('Wallet connection will be integrated.');
    }

    const canvas = document.getElementById('pixelCanvas');
    const ctx = canvas.getContext('2d');
    for (let x = 0; x < 400; x += 20) {
      for (let y = 0; y < 400; y += 20) {
        ctx.fillStyle = '#111';
        ctx.fillRect(x, y, 18, 18);
      }
    }
  </script>
</body>
</html>
