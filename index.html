<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REBASED PIXELS</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; padding: 0; background-color: #0f0f1a; color: #e0e0e0; font-family: 'Orbitron', sans-serif; overflow-x: hidden; position: relative; }
    header { text-align: center; padding: 2rem; font-size: 3rem; color: #00ffcc; text-shadow: 0 0 20px #00ffcc; }
    .main-card { margin: 2rem auto; padding: 2rem; background: rgba(20, 20, 40, 0.9); border-radius: 20px; width: 90%; max-width: 2200px; border: 2px solid #00ffcc; box-shadow: 0 0 25px rgba(0, 255, 204, 0.3); text-align: center; overflow: auto; }
    .wallet-card { background: rgba(10, 10, 25, 0.9); border-radius: 15px; padding: 1.5rem; margin: 1rem 0; box-shadow: 0 0 15px rgba(0, 255, 204, 0.1); }
    .wallet-card button { background: linear-gradient(90deg, #00ffcc, #00bbaa); border: none; padding: 0.75rem 1.5rem; margin: 0.5rem; border-radius: 10px; color: #000; font-size: 1rem; cursor: pointer; box-shadow: 0 0 12px #00ffcc; transition: transform 0.2s, box-shadow 0.3s; }
    .wallet-card button:hover { transform: scale(1.05); box-shadow: 0 0 20px #00ffcc; }
    .color-picker { margin: 1rem 0; display: none; }
    .color-picker input[type="color"] { width: 60px; height: 40px; border: none; background: none; cursor: pointer; padding: 0; }
    .color-picker label { margin-right: 10px; }
    .canvas-wrapper { display: flex; justify-content: center; align-items: center; margin-top: 2rem; }
    #pixelCanvas { border: 2px solid #00ffcc; border-radius: 12px; box-shadow: 0 0 20px rgba(0, 255, 204, 0.3); background-color: #0f0f1a; }
    .background-splashes { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: -1; }
    .splash { position: absolute; width: 200px; height: 200px; border-radius: 50%; filter: blur(50px); animation: moveAndFade 15s infinite ease-in-out; }
    .splash:nth-child(odd) { background: radial-gradient(circle, #00ffcc66, transparent 70%); }
    .splash:nth-child(even) { background: radial-gradient(circle, #ff00cc66, transparent 70%); }
    @keyframes moveAndFade { 0% { transform: translateY(0) translateX(0) scale(1); opacity: 0; } 20% { opacity: 0.8; } 80% { opacity: 0.8; } 100% { transform: translateY(-30vh) translateX(80vw) scale(1.5); opacity: 0; } }
    footer { margin-top: 3rem; text-align: center; font-size: 0.9rem; color: #555; }
  </style>
</head>
<body>
  <header>REBASED PIXELS</header>
  <div class="main-card">
    <div class="wallet-card">
      <div>Wallet: <span id="walletAddress">Not Connected</span></div>
      <div>Balance: <span id="walletBalance">0</span></div>
      <button onclick="connectWallet()">Connect Wallet</button>
      <div class="color-picker" id="colorPicker">
        <label for="colorInput">Pick a color:</label>
        <input type="color" id="colorInput" value="#ff0000">
      </div>
    </div>
    <div class="canvas-wrapper">
      <canvas id="pixelCanvas" width="1808" height="1808"></canvas>
    </div>
  </div>
  <footer>Powered by IOTA Rebased Testnet | Epoch Ends in: <span id="epochTimer">23:59:59</span></footer>
  <div class="background-splashes">
    <div class="splash" style="top:5%; left:10%; animation-delay: 0s;"></div>
    <div class="splash" style="top:15%; left:70%; animation-delay: 2s;"></div>
    <div class="splash" style="top:25%; left:30%; animation-delay: 4s;"></div>
    <div class="splash" style="top:35%; left:85%; animation-delay: 6s;"></div>
    <div class="splash" style="top:45%; left:20%; animation-delay: 8s;"></div>
    <div class="splash" style="top:55%; left:60%; animation-delay: 10s;"></div>
    <div class="splash" style="top:65%; left:40%; animation-delay: 12s;"></div>
    <div class="splash" style="top:75%; left:90%; animation-delay: 14s;"></div>
  </div>

    function drawGrid() {
      ctx.fillStyle = '#111';
      for (let x = 0; x < 1808; x += pixelSize) {
        for (let y = 0; y < 1808; y += pixelSize) {
          ctx.fillRect(x, y, pixelSize - 1, pixelSize - 1);
        }
      }
    }

    // Convert hex color to RGB array
    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return [r, g, b];
    }
